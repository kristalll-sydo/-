<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <defs>
    <style>
      .title{font:700 28px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
      .label{font:600 21px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#24324a}
      .small{font:16px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#4b5870}
      .cell{fill:#eef4ff;stroke:#4169a9;stroke-width:3}
      .bad{fill:#fff1f0;stroke:#d24c41;stroke-width:3}
      .good{fill:#edf9f0;stroke:#3d8b55;stroke-width:3}
      .arrow{stroke:#d24c41;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d24c41"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fbfcff"/>
  <text x="58" y="58" class="title">囚徒困境的支付结构</text>
  <text x="58" y="92" class="small">典型排序：T &gt; R &gt; P &gt; S，个体优势策略与集体最优发生冲突</text>
  <text x="210" y="138" class="label">玩家 2 合作</text>
  <text x="475" y="138" class="label">玩家 2 背叛</text>
  <text x="62" y="230" class="label">玩家 1 合作</text>
  <text x="62" y="365" class="label">玩家 1 背叛</text>
  <rect x="205" y="165" width="230" height="120" class="good"/>
  <rect x="465" y="165" width="230" height="120" class="cell"/>
  <rect x="205" y="315" width="230" height="120" class="cell"/>
  <rect x="465" y="315" width="230" height="120" class="bad"/>
  <text x="282" y="230" class="label">(R, R)</text>
  <text x="535" y="230" class="label">(S, T)</text>
  <text x="275" y="380" class="label">(T, S)</text>
  <text x="535" y="380" class="label">(P, P)</text>
  <path d="M320 285 L320 315" class="arrow"/>
  <path d="M695 225 C760 250, 760 340, 695 365" class="arrow"/>
  <text x="735" y="300" class="small">背叛是个体最优反应</text>
  <text x="205" y="470" class="small">困境在于：双方理性背叛导致 (P,P)，却共同低于可合作的 (R,R)。</text>
</svg>
